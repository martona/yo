name: Bump Homebrew tap

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Existing release tag to publish to the tap, e.g. v0.2.2"
        required: true
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Is HOMEBREW_TAP_TOKEN configured?
        id: guard
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -n "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set -- skipping Homebrew tap bump."
          fi

      - name: Dispatch tap bump
        if: steps.guard.outputs.ok == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs['release-tag'] }}
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::release tag is required"
            exit 1
          fi
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/martona/homebrew-tap/dispatches \
            -d "{\"event_type\":\"bump-homebrew-package\",\"client_payload\":{\"target\":\"yo\",\"tag\":\"$RELEASE_TAG\"}}"
