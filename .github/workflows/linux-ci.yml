name: Linux CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: gofmt (must be clean)
        run: |
          bad="$(gofmt -l .)"
          if [[ -n "$bad" ]]; then
            echo "gofmt needs running on:"
            echo "$bad"
            exit 1
          fi
          echo "gofmt clean"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: bash snippet parse smoke
        # Ubuntu runners ship bash 5.x -- this exercises the real bash >= 4.2 path
        # that macOS CI cannot (its /bin/bash is 3.2 and its /bin/sh is bash, which
        # hid the dash no-op-guard bug fixed in the Linux port).
        run: |
          bash --version | head -n1
          bash -n shell/yo.bash
          go run ./cmd/yo --init bash | bash -n

      - name: Install zsh
        # zsh is NOT on the GitHub Ubuntu image by default; yo targets zsh on Linux
        # too (the POSIX setup path wires .zshrc), so install it for a real
        # Linux-zsh syntax check distinct from the macOS runner.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zsh

      - name: zsh snippet parse smoke
        run: |
          zsh -n shell/yo.zsh
          go run ./cmd/yo --init zsh | zsh -n

      - name: Build linux binaries
        env:
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOARCH="$arch" go build -trimpath -o "dist/yo-linux-$arch" ./cmd/yo
          done
          ls -la dist/
          # Confirm the build is fully static (no dynamic deps, not even glibc) -- the
          # invariant the whole Linux packaging story rests on.
          file dist/yo-linux-amd64
          file dist/yo-linux-amd64 | grep -q "statically linked" || {
            echo "::error::dist/yo-linux-amd64 is not statically linked" >&2
            exit 1
          }

  package:
    name: Build + package (deb/rpm/arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build static binaries (amd64 + arm64)
        env:
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOARCH="$arch" go build -trimpath -ldflags "-s -w" -o "dist/yo-linux-$arch" ./cmd/yo
          done

      - name: Build packages (nfpm) and stage canonical names
        # A synthetic 0.0.0 version: the package install/smoke does not depend on the
        # version value, and the release pipeline (Phase 5) passes the real tag.
        run: |
          mkdir -p packages
          for arch in amd64 arm64; do
            bash scripts/package_linux.sh --version 0.0.0 --binary "dist/yo-linux-$arch" --arch "$arch" --outdir "dist/pkg-$arch"
            cp "$(ls dist/pkg-$arch/*.deb)"         "packages/yo-linux-$arch.deb"
            cp "$(ls dist/pkg-$arch/*.rpm)"         "packages/yo-linux-$arch.rpm"
            cp "$(ls dist/pkg-$arch/*.pkg.tar.zst)" "packages/yo-linux-$arch.pkg.tar.zst"
          done
          ls -la packages/

      - name: Inspect package contents
        # Show exactly what nfpm put in each format -- in particular whether the
        # /usr/share/doc/yo/ license files landed -- so a packaging-side problem is
        # visible here in the build log, distinct from any install-side issue.
        run: |
          echo "=== deb (amd64) ==="
          dpkg-deb -c packages/yo-linux-amd64.deb
          echo "=== rpm (amd64) -- via bsdtar/tar ==="
          tar -tvf packages/yo-linux-amd64.rpm 2>/dev/null || bsdtar -tvf packages/yo-linux-amd64.rpm 2>/dev/null || echo "(no tool to list rpm; skipping)"
          echo "=== arch (amd64) ==="
          tar --zstd -tvf packages/yo-linux-amd64.pkg.tar.zst

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: linux-packages
          path: packages/*
          if-no-files-found: error
          retention-days: 1

  package-test:
    name: Install ${{ matrix.kind }} on ${{ matrix.image }} (${{ matrix.arch }})
    needs: package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: "debian:12",        arch: amd64, kind: deb,  runner: ubuntu-latest }
          - { image: "ubuntu:20.04",     arch: amd64, kind: deb,  runner: ubuntu-latest }
          - { image: "fedora:latest",    arch: amd64, kind: rpm,  runner: ubuntu-latest }
          - { image: "almalinux:9",      arch: amd64, kind: rpm,  runner: ubuntu-latest }
          - { image: "archlinux:latest", arch: amd64, kind: arch, runner: ubuntu-latest }
          # arm64: lighter smoke (one deb + one rpm) on a native ARM runner, no QEMU.
          - { image: "debian:12",        arch: arm64, kind: deb,  runner: ubuntu-24.04-arm }
          - { image: "fedora:latest",    arch: arm64, kind: rpm,  runner: ubuntu-24.04-arm }
    steps:
      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: linux-packages
          path: packages

      - name: Install and smoke-test in container
        env:
          IMAGE: ${{ matrix.image }}
          ARCH: ${{ matrix.arch }}
          KIND: ${{ matrix.kind }}
        run: |
          set -euo pipefail
          case "$KIND" in
            deb)  install="dpkg -i /pkg/yo-linux-$ARCH.deb" ;;
            rpm)  install="rpm -i /pkg/yo-linux-$ARCH.rpm" ;;
            # Unsigned local packages install fine: Arch's default LocalFileSigLevel is
            # Optional (it governs `pacman -U` on local files; the stricter SigLevel
            # applies to repository packages), which is why makepkg/AUR installs work.
            arch) install="pacman -U --noconfirm /pkg/yo-linux-$ARCH.pkg.tar.zst" ;;
            *)    echo "unknown kind: $KIND" >&2; exit 1 ;;
          esac
          # The package has ZERO dependencies (static binary), so every install runs
          # offline -- no apt/dnf repo refresh needed. The host runs the actions; the
          # container only needs its package manager + bash.
          #
          # Self-diagnosing: install must succeed (hard fail), then run each assertion
          # independently and report PASS/FAIL per step so one run shows exactly what is
          # wrong on each distro. We deliberately do NOT use `yo --check` here -- it
          # reports on shell-profile wiring (which we never set up in a throwaway
          # container), not on whether the package installed correctly.
          docker run --rm -v "$PWD/packages:/pkg:ro" "$IMAGE" bash -c "
            set -u
            echo '=== install ==='
            if ! ( $install ); then echo 'FAIL: install'; exit 1; fi
            echo '=== /usr/share/doc/yo ==='
            ls -la /usr/share/doc/yo/ 2>&1 || true
            echo '=== smoke ==='
            fail=0
            chk() { if eval \"\$2\"; then echo \"  PASS: \$1\"; else echo \"  FAIL: \$1\"; fail=1; fi; }
            chk 'yo resolves on PATH'      'command -v yo >/dev/null'
            chk 'yo --version runs'        'yo --version >/dev/null'
            chk 'yo --help exits 0'        'yo --help >/dev/null'
            chk 'yo --init bash parses'    'yo --init bash > /tmp/snip && bash -n /tmp/snip'
            chk 'LICENSE doc installed'    'test -f /usr/share/doc/yo/LICENSE'
            if [ \"\$fail\" -ne 0 ]; then echo \"SMOKE FAILED: $IMAGE ($ARCH/$KIND)\"; exit 1; fi
            echo \"SMOKE OK: $IMAGE ($ARCH/$KIND)\"
          "
