name: Release pipeline (reusable)

# Build -> sign/notarize -> package -> attest -> publish.
# Invoked from release-tag.yml / release-manual.yml; not directly triggerable.
# Callers pass the version (from the git tag) and the draft flag.
#
# Windows uses Azure Trusted Signing. macOS uses Developer ID signing plus Apple
# notarization, following the same secrets/variables as martona/clipp:
#
#   secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#            APPLE_CERTIFICATE_P12, APPLE_CERTIFICATE_P12_PASSWORD,
#            APPLE_KEYCHAIN_PASSWORD, APPLE_API_KEY_P8
#   vars:    ARTIFACT_SIGNING_ENDPOINT, ARTIFACT_SIGNING_ACCOUNT,
#            ARTIFACT_SIGNING_CERTIFICATE_PROFILE,
#            APPLE_CODESIGN_IDENTITY, APPLE_TEAM_ID,
#            APPLE_API_KEY_ID, APPLE_API_ISSUER_ID
#   environment: release-signing

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'Semver without the v prefix (e.g. 0.1.0), parsed from the tag by the caller'
      tag:
        required: true
        type: string
        description: 'Full tag name including the v prefix (e.g. v0.1.0)'
      draft:
        required: true
        type: boolean
        description: 'Create the GitHub release as a draft (not published)'

permissions:
  contents: write       # create release + upload assets
  id-token: write       # Azure OIDC for Trusted Signing + sigstore OIDC for attestation
  attestations: write   # write build provenance attestation

jobs:
  notices:
    name: Third-party notices + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Generate third-party licenses + SBOM
        run: |
          go install github.com/google/go-licenses@latest
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          gobin="$(go env GOPATH)/bin"
          "$gobin/go-licenses" save ./cmd/yo --save_path=tpl-tree --force --ignore github.com/martona/yo
          "$gobin/cyclonedx-gomod" app -json -licenses -assert-licenses -main cmd/yo -output yo.cdx.json .
          # Collapse the per-module license tree into ONE THIRD-PARTY-LICENSES.txt. A
          # portable CLI that ships 360+ separate license files trips archive malware
          # scanners (winget's dynamic scan, the local MOTW scan); one text file carries
          # the same verbatim texts and keeps the package to a handful of entries.
          {
            echo "Third-party license notices for yo"
            echo "Generated by go-licenses from the Go module dependency tree."
            echo "Each section is the verbatim license of one bundled module."
            echo
            find tpl-tree -type f | sort | while IFS= read -r f; do
              mod=${f#tpl-tree/}; mod=$(dirname "$mod")
              echo "================================================================================"
              echo "$mod"
              echo "================================================================================"
              echo
              cat "$f"
              echo
              echo
            done
          } > THIRD-PARTY-LICENSES.txt
          echo "Combined $(find tpl-tree -type f | wc -l) files -> THIRD-PARTY-LICENSES.txt ($(wc -l < THIRD-PARTY-LICENSES.txt) lines)"

      - name: License compatibility check (non-blocking)
        continue-on-error: true
        run: |
          "$(go env GOPATH)/bin/go-licenses" check ./cmd/yo --ignore github.com/martona/yo

      - name: Upload third-party license texts
        uses: actions/upload-artifact@v6
        with:
          name: third-party-licenses
          path: THIRD-PARTY-LICENSES.txt
          if-no-files-found: error
          retention-days: 1

      - name: Upload SBOM release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-sbom
          path: yo.cdx.json
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: notices
    environment: release-signing
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Test before release
        run: go test ./...

      - name: Build (amd64 + arm64)
        env:
          GOOS: windows
          CGO_ENABLED: '0'
        run: |
          $ldflags = "-s -w -X main.version=${{ inputs.tag }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          foreach ($arch in 'amd64', 'arm64') {
            $env:GOARCH = $arch
            go build -trimpath -ldflags $ldflags -o "dist/yo-$arch.exe" ./cmd/yo
            if ($LASTEXITCODE -ne 0) { throw "build failed for $arch" }
            Write-Host "Built dist/yo-$arch.exe"
          }

      - name: Azure login (Trusted Signing)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign binaries
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        run: |
          foreach ($exe in Get-ChildItem dist\*.exe) {
            $sig = Get-AuthenticodeSignature $exe.FullName
            if ($sig.Status -ne 'Valid') {
              throw "Signature on $($exe.Name) is not Valid: $($sig.Status) -- $($sig.StatusMessage)"
            }
            Write-Host "[+] $($exe.Name) signed by: $($sig.SignerCertificate.Subject)"
          }

      - name: Download license texts
        uses: actions/download-artifact@v7
        with:
          name: third-party-licenses
          path: third-party-licenses

      - name: Package
        run: |
          $stage = "release-stage"
          New-Item -ItemType Directory -Force $stage | Out-Null
          foreach ($arch in 'amd64', 'arm64') {
            $pkg = "pkg-$arch"
            New-Item -ItemType Directory -Force $pkg | Out-Null
            Copy-Item "dist/yo-$arch.exe" "$pkg/yo.exe"
            Copy-Item LICENSE, NOTICE, README.md $pkg
            Copy-Item third-party-licenses/THIRD-PARTY-LICENSES.txt $pkg
            Compress-Archive -Path "$pkg/*" -DestinationPath "$stage/yo-windows-$arch.zip" -Force
            Write-Host "Created $stage/yo-windows-$arch.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: notices
    environment: release-signing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Test before release
        run: go test ./...

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "${{ runner.temp }}/authkey.p8"
          if ! grep -q "BEGIN PRIVATE KEY" "${{ runner.temp }}/authkey.p8"; then
            echo "::error::APPLE_API_KEY_P8 secret doesn't look like a PEM .p8 file"
            exit 1
          fi

      - name: Build and sign binaries
        env:
          APPLE_CODESIGN_IDENTITY: ${{ vars.APPLE_CODESIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          CGO_ENABLED: '0'
          GOOS: darwin
        run: |
          set -euo pipefail
          : "${APPLE_CODESIGN_IDENTITY:?APPLE_CODESIGN_IDENTITY repo variable is required}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID repo variable is required}"

          ldflags="-s -w -X main.version=${{ inputs.tag }}"
          mkdir -p dist
          for arch in amd64 arm64; do
            GOARCH="$arch" go build -trimpath -ldflags "$ldflags" -o "dist/yo-darwin-$arch" ./cmd/yo
            codesign --force --options=runtime --timestamp \
              --sign "$APPLE_CODESIGN_IDENTITY" "dist/yo-darwin-$arch"
            codesign --verify --strict --verbose=2 "dist/yo-darwin-$arch"
            if ! codesign --display --verbose=4 "dist/yo-darwin-$arch" 2>&1 | grep -Eq 'flags=.*runtime'; then
              echo "::error::hardened runtime flag not present on dist/yo-darwin-$arch"
              exit 1
            fi
            echo "Signed dist/yo-darwin-$arch"
          done

      - name: Download license texts
        uses: actions/download-artifact@v7
        with:
          name: third-party-licenses
          path: third-party-licenses

      - name: Package and notarize
        env:
          APPLE_API_KEY_PATH: ${{ runner.temp }}/authkey.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_PATH:?APPLE_API_KEY_PATH is required}"
          : "${APPLE_API_KEY_ID:?APPLE_API_KEY_ID repo variable is required}"
          : "${APPLE_API_ISSUER_ID:?APPLE_API_ISSUER_ID repo variable is required}"

          notarize_zip() {
            local zip_path="$1"
            local log_path="${RUNNER_TEMP}/notarytool-$(basename "$zip_path").log"
            echo "Submitting $zip_path to Apple notarization..."
            set +e
            xcrun notarytool submit "$zip_path" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --wait 2>&1 | tee "$log_path"
            local notary_status=${PIPESTATUS[0]}
            set -e

            local submission_id
            submission_id="$(grep -E '^[[:space:]]*id:' "$log_path" | head -n1 | awk '{print $2}')"
            if [[ "$notary_status" -ne 0 ]] || ! grep -Eq '^[[:space:]]*status: Accepted[[:space:]]*$' "$log_path"; then
              echo "::error::Notarization did not return Accepted for $zip_path"
              if [[ -n "$submission_id" ]]; then
                xcrun notarytool log "$submission_id" \
                  --key "$APPLE_API_KEY_PATH" \
                  --key-id "$APPLE_API_KEY_ID" \
                  --issuer "$APPLE_API_ISSUER_ID" >&2 || true
              fi
              exit 1
            fi
          }

          mkdir -p release-stage
          for arch in amd64 arm64; do
            pkg="pkg-macos-$arch"
            rm -rf "$pkg"
            mkdir -p "$pkg"
            cp "dist/yo-darwin-$arch" "$pkg/yo"
            cp LICENSE NOTICE README.md "$pkg/"
            cp third-party-licenses/THIRD-PARTY-LICENSES.txt "$pkg/"
            (cd "$pkg" && /usr/bin/ditto -c -k --sequesterRsrc . "../release-stage/yo-macos-$arch.zip")
            notarize_zip "release-stage/yo-macos-$arch.zip"
          done

          ls -la release-stage/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: notices
    # No signing job: a static CGO_ENABLED=0 binary needs none, and integrity is
    # covered by SHA256SUMS.txt + the build-provenance attestation in publish. Both
    # arches are cross-built and cross-packaged from one amd64 runner (pure Go + an
    # arch-agnostic nfpm), so unlike Windows/macOS there is no per-arch job.
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Test before release
        run: go test ./...

      - name: Build static binaries (amd64 + arm64)
        env:
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          ldflags="-s -w -X main.version=${{ inputs.tag }}"
          mkdir -p dist
          for arch in amd64 arm64; do
            GOARCH="$arch" go build -trimpath -ldflags "$ldflags" -o "dist/yo-linux-$arch" ./cmd/yo
          done
          file dist/yo-linux-amd64 | grep -q "statically linked" || {
            echo "::error::dist/yo-linux-amd64 is not statically linked" >&2; exit 1; }

      - name: Download license texts
        uses: actions/download-artifact@v7
        with:
          name: third-party-licenses
          path: third-party-licenses

      - name: Package (deb/rpm/arch) + stage assets
        run: |
          set -euo pipefail
          mkdir -p release-stage
          for arch in amd64 arm64; do
            # Native packages -- package_linux.sh autodetects the downloaded
            # THIRD-PARTY-LICENSES.txt and bundles all license docs into the package.
            bash scripts/package_linux.sh --version "${{ inputs.version }}" \
              --binary "dist/yo-linux-$arch" --arch "$arch" --outdir "dist/pkg-$arch"
            # Version-LESS canonical names for stable releases/latest/download URLs
            # (the version still lives in package metadata + `yo --version`).
            cp "$(ls dist/pkg-$arch/*.deb)"         "release-stage/yo-linux-$arch.deb"
            cp "$(ls dist/pkg-$arch/*.rpm)"         "release-stage/yo-linux-$arch.rpm"
            cp "$(ls dist/pkg-$arch/*.pkg.tar.zst)" "release-stage/yo-linux-$arch.pkg.tar.zst"

            # Bare binary for the curl-and-chmod path (clipp parity). The license is
            # conveyed via the release's own LICENSE + SHA256SUMS and the native
            # packages; the bare binary ships without an adjacent doc, like clipp's.
            cp "dist/yo-linux-$arch" "release-stage/yo-linux-$arch"
          done

          # Confirm the release-specific THIRD-PARTY-LICENSES.txt bundling actually
          # rode into the shipped artifacts (linux-ci proves LICENSE/NOTICE on every
          # push; the generated TPL is only present at release time, so check it here).
          # Capture listings into vars and match with a pipe-free `case` -- a
          # `<lister> | grep -q` would SIGPIPE the lister under `pipefail` (grep -q
          # closes the pipe at first match) and falsely report "missing".
          has() { case "$1" in *"$2"*) return 0 ;; *) return 1 ;; esac; }
          for arch in amd64 arm64; do
            deb_list="$(dpkg-deb -c "dist/pkg-$arch/"*.deb)"
            has "$deb_list" 'usr/share/doc/yo/THIRD-PARTY-LICENSES.txt' || {
              echo "::error::deb ($arch) missing THIRD-PARTY-LICENSES.txt" >&2; exit 1; }
          done
          ls -la release-stage/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Create release
    runs-on: ubuntu-latest
    needs: [notices, build-windows, build-macos, build-linux]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          root = Path("artifacts")
          lines = []
          for path in sorted(p for p in root.iterdir() if p.is_file() and p.name != "SHA256SUMS.txt"):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")
          (root / "SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="ascii")
          print((root / "SHA256SUMS.txt").read_text(encoding="ascii"), end="")
          PY
          ls -la artifacts/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'artifacts/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true

      - name: Trigger Homebrew bump (direct publishes only)
        # A `publish: true` release is published by this run's GITHUB_TOKEN, so GitHub's
        # loop guard emits no `release` event that can start a workflow -- the tap's
        # homebrew-tap.yml `release: [published]` trigger never sees it. Dispatch the bump
        # straight to the tap here (the same call homebrew-tap.yml makes). Drafts skip
        # this: a human publishes them later, which DOES emit `release: published`.
        if: ${{ inputs.draft == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set -- skipping Homebrew bump."
            exit 0
          fi
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/martona/homebrew-tap/dispatches \
            -d "{\"event_type\":\"bump-homebrew-package\",\"client_payload\":{\"target\":\"yo\",\"tag\":\"$RELEASE_TAG\"}}"
