name: Release (tag)

# Auto-fires when a vX.Y.Z tag is pushed. The tag IS the version (baked into the
# binary via -ldflags). Always drafts; publish via the UI's Publish button or
# `gh release edit --draft=false <tag>`. Heavy lifting is in _release.yml.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - id: compute
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          # Accept vMAJOR.MINOR.PATCH with an optional -prerelease / +build suffix.
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
            echo "::error::Tag '$tag' must be v<major>.<minor>.<patch> (optional -suffix), e.g. v0.1.0"; exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$ver tag=$tag"

  pipeline:
    name: Build, sign, publish
    needs: resolve
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      tag: ${{ needs.resolve.outputs.tag }}
      draft: true
    secrets: inherit
