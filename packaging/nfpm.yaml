# nfpm config: one static yo binary -> .deb, .rpm, and Arch .pkg.tar.zst.
# https://nfpm.goreleaser.com/configuration/
#
# Driven by scripts/package_linux.sh. The ${...} tokens below are NOT expanded by
# nfpm (its contents[].src glob arrives literal) -- the script renders them with
# envsubst/perl into a concrete config before invoking `nfpm package` per packager.
#
# Dependencies: yo is built CGO_ENABLED=0, so the binary is FULLY STATIC -- no
# dynamic libraries at all, not even libc. There is therefore NO `depends:` /
# `overrides:` block: one package installs and runs on any glibc/musl distro of the
# matching arch with nothing else pulled in. (Contrast ../clipp, which links
# libavahi-client and must declare it per packager.)

name: yo
arch: ${NFPM_ARCH}
platform: linux
version: ${NFPM_VERSION}
section: utils
priority: optional
maintainer: Marton Anka <martona@users.noreply.github.com>
vendor: Marton Anka
homepage: https://github.com/martona/yo
license: GPL-3.0-or-later
description: |
  yo -- an LLM-powered command assistant for your shell.
  Type `yo <natural language>` at your prompt and yo asks an LLM to translate it
  into a shell command, which it PREFILLS onto your command line to run, edit, or
  cancel -- it never executes anything on its own. Supports bash and zsh; bring
  your own API key (Anthropic, OpenAI, Grok, or Gemini). After installing, run
  `yo --setup` to wire the integration into your shell profile.

contents:
  - src: ${YO_BINARY}
    dst: /usr/bin/yo
    file_info:
      mode: 0755
  # License/provenance docs (GPLv3 obligation on binary distribution). The script
  # stages whatever it has (LICENSE/NOTICE/README always; THIRD-PARTY-LICENSES.txt
  # when the release pipeline has generated it) into ${YO_DOCDIR} and we glob it.
  - src: ${YO_DOCDIR}/*
    dst: /usr/share/doc/yo/
    file_info:
      mode: 0644
